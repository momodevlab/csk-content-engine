name: AI News Feed (Track 2)

on:
  schedule:
    - cron: '0 */4 * * *'   # Every 4 hours: 12AM, 4AM, 8AM, 12PM, 4PM, 8PM UTC
  workflow_dispatch:

jobs:
  run-news-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright
        run: playwright install chromium --with-deps

      - name: Run news feed pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REDDIT_USER_AGENT: CSKContentBot/1.0
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
          GHL_LINKEDIN_ACCOUNT_ID: ${{ secrets.GHL_LINKEDIN_ACCOUNT_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_APPROVAL_CHANNEL_ID: ${{ secrets.SLACK_APPROVAL_CHANNEL_ID }}
          SLACK_NEWS_CHANNEL_ID: ${{ secrets.SLACK_NEWS_CHANNEL_ID }}
          SLACK_PERFORMANCE_CHANNEL_ID: ${{ secrets.SLACK_PERFORMANCE_CHANNEL_ID }}
        run: python main_news.py

      - name: Commit seen_stories.json update
        run: |
          git config user.name "CSK Content Bot"
          git config user.email "bot@csktech.solutions"
          git add seen_stories.json pending_approvals.json published_content.json || true
          git diff --staged --quiet || git commit -m "chore: update pipeline state [skip ci]"
          git push || true
